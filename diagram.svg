<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 760" aria-label="EAP-MD5 802.1X Authentication Flow">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"></path>
    </marker>
    <style>
      .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 13px Arial, Helvetica, sans-serif; fill: #475569; }
      .role { font: 700 20px Arial, Helvetica, sans-serif; }
      .roleid { font: 12px Arial, Helvetica, sans-serif; }
      .label { font: 700 16px Arial, Helvetica, sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
      .small { font-size: 12px; font-weight: 600; }
      .node { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; cursor: pointer; transition: fill 0.15s ease, transform 0.15s ease; }
      .node:hover { fill: #bfdbfe; }
      .node.active { fill: #93c5fd; stroke: #1d4ed8; stroke-width: 3; }
      .link { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .lifeline { stroke: #94a3b8; stroke-dasharray: 8 8; stroke-width: 2; }
    </style>
  </defs>

  <rect width="980" height="760" fill="#fcfdff" rx="12" ry="12"/>

  <text x="490" y="42" text-anchor="middle" class="title">IEEE 802.1X / EAP-MD5 Authentication</text>
  <text x="490" y="70" text-anchor="middle" class="subtitle">Captured frames only • ACK frames excluded • Click a frame for details</text>

  <rect x="185" y="100" rx="16" ry="16" width="230" height="70" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="300" y="138" text-anchor="middle" class="role" fill="#164e63">Supplicant</text>
  <text x="300" y="158" text-anchor="middle" class="roleid" fill="#0e7490">DLink_58:f1:ce</text>

  <rect x="565" y="100" rx="16" ry="16" width="230" height="70" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="680" y="138" text-anchor="middle" class="role" fill="#1e3a8a">Authenticator</text>
  <text x="680" y="158" text-anchor="middle" class="roleid" fill="#1d4ed8">CiscoLinksys_19:6e:9a</text>

  <line x1="300" y1="180" x2="300" y2="680" class="lifeline"/>
  <line x1="680" y1="180" x2="680" y2="680" class="lifeline"/>

  <g class="svg-node" data-frame="15">
    <line x1="310" y1="230" x2="670" y2="230" class="link"/>
    <rect class="node active" x="440" y="200" rx="14" ry="14" width="140" height="58"/>
    <text class="label" x="510" y="221">Frame 15</text>
    <text class="label small" x="510" y="241">EAPOL-Start</text>
  </g>

  <g class="svg-node" data-frame="17">
    <line x1="670" y1="310" x2="310" y2="310" class="link"/>
    <rect class="node" x="440" y="280" rx="14" ry="14" width="140" height="58"/>
    <text class="label" x="510" y="301">Frame 17</text>
    <text class="label small" x="510" y="321">Request Identity</text>
  </g>

  <g class="svg-node" data-frame="19">
    <line x1="310" y1="390" x2="670" y2="390" class="link"/>
    <rect class="node" x="440" y="360" rx="14" ry="14" width="140" height="58"/>
    <text class="label" x="510" y="381">Frame 19</text>
    <text class="label small" x="510" y="401">Response Identity</text>
  </g>

  <g class="svg-node" data-frame="21">
    <line x1="670" y1="470" x2="310" y2="470" class="link"/>
    <rect class="node" x="440" y="440" rx="14" ry="14" width="140" height="58"/>
    <text class="label" x="510" y="461">Frame 21</text>
    <text class="label small" x="510" y="481">MD5 Challenge</text>
  </g>

  <g class="svg-node" data-frame="23">
    <line x1="310" y1="550" x2="670" y2="550" class="link"/>
    <rect class="node" x="440" y="520" rx="14" ry="14" width="140" height="58"/>
    <text class="label" x="510" y="541">Frame 23</text>
    <text class="label small" x="510" y="561">MD5 Response</text>
  </g>

  <g class="svg-node" data-frame="25">
    <line x1="670" y1="630" x2="310" y2="630" class="link"/>
    <rect class="node" x="440" y="600" rx="14" ry="14" width="140" height="58"/>
    <text class="label" x="510" y="621">Frame 25</text>
    <text class="label small" x="510" y="641">EAP Success</text>
  </g>
</svg>
